services:
  db:
    image: pgvector/pgvector:pg15
    container_name: django_postgres_db
    restart: always
    environment:
      POSTGRES_DB: snct
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin@1234
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: